"><!--[--><article class="post-card svelte-podw4w post-card-large"><div class="post-card-content svelte-podw4w"><a class="post-card-content-link svelte-podw4w" href="/valley_strategy"><header class="post-card-header"><!--[0--><div class="post-card-primary-tag svelte-podw4w">Summary</div><!--]--> <h2 class="post-card-title svelte-podw4w">Valley Strategy</h2></header> <section class="post-card-excerpt svelte-podw4w"><p class="svelte-podw4w">Sumarizing books comonly used to build business strategy</p></section></a> <footer class="post-card-meta svelte-podw4w"><div class="post-card-byline-content svelte-podw4w"><span class="post-card-byline-date svelte-podw4w"><time datetime="2024-07-06">06 Jul 2024</time> <span class="bull svelte-podw4w">•</span> 5 min read</span></div></footer></div></article><!--]--></div></div></main> <footer class="site-footer outer svelte-jz8lnl"><div class="inner site-footer-content svelte-jz8lnl"><section class="copyright"><a href="/">Ken Cross</a> © 2026</section> <nav class="site-footer-nav svelte-jz8lnl" aria-label="Footer Navigation"><a href="/" class="svelte-jz8lnl">Latest Posts</a> <!--[0--><a href="https://bsky.app/profile/k-cross.github.io" target="_blank" rel="noopener noreferrer" class="svelte-jz8lnl">Bluesky</a><!--]--> <a href="/rss.xml" class="svelte-jz8lnl">RSS</a></nav></div></footer><!----><!----></div><!--]--><!----><!--]--><!--]--> <!--[-1--><!--]--><!--]-->

						kit.start(app, element, {
							node_ids: [0, 4],
							data: [null,(function(a,b){a[0]="Ken Cross";b[0]="Summary";b[1]="Business";return {type:"data",data:{posts:[{layout:"post",title:"Valley Strategy",author:a,tags:b,excerpt:"Sumarizing books comonly used to build business strategy",date:"2024-07-07T00:00:00.000Z",modified:"2024-07-07T00:00:00.000Z",draft:false,frontmatter:{layout:"post",title:"Valley Strategy",author:a,tags:b,excerpt:"Sumarizing books comonly used to build business strategy",date:"2024-07-07T00:00:00.000Z",modified:"2024-07-07T00:00:00.000Z",draft:false},html:"\u003C!--[-->\u003Cp>There are books that many companies in Silicon Valley use to build their corporate strategies or use to justify their culture. This summarizes one popular set of books, from an engineering point of view, focusing on the strategy bits. It is easy to find flaws in the arguments of these books and cases where they don’t apply at all. That said, the point of these books are not to be perfect predictive models in the way one thinks about science and engineering. Rather, using them to understand why a company is behaving in a particular way so you can do something about it, is arguably more useful. The intent is to help diagnose pathologies and communicate more effectively with business leaders.\u003C/p> \u003Ch2 id=\"setting-the-stage\">\u003Ca href=\"#setting-the-stage\">Setting the Stage\u003C/a>\u003C/h2> \u003Cp>There are four books being reviewed: ‘Crossing the Chasm’, ‘The Innovators Dilemma’, ‘Escape Velocity’, and ‘Zone to Win’. \u003Cem>It should be noted that all books except ‘The Innovators Dilemma’ focus on B2B companies specifically.\u003C/em> These books ask two core questions:\u003C/p> \u003Cul>\u003Cli>What are the mechanisms by which innovations succeed becoming defaults or monopolizing a market long-term?\u003C/li> \u003Cli>Why do already successful companies often fail when trying to land new disruptive innovations?\u003C/li>\u003C/ul> \u003Ch2 id=\"pits-of-uncertainty\">\u003Ca href=\"#pits-of-uncertainty\">Pits of Uncertainty\u003C/a>\u003C/h2> \u003Cp>Both questions are answered throughout each book, with different contexts. Starting with the first question it seems logical to start with ‘Crossing the Chasm’. The book primarily focuses on the marketing and sales aspects of a business. The phrase, \u003Cem>crossing the chasm\u003C/em>, refers to marketing gaps or \u003Cem>chasms\u003C/em> in the life-cycle of technical products during the different stages of maturity. It’s usually visualized as a bell curve with gaps at each standard deviation to the left and right, where the area under the curve represents market adoption. My graphic is different because the information being conveyed in that form makes it look scientific or like statistics are being conducted with \u003Cem>data\u003C/em>.\u003C/p> \u003Cpre class=\"language-mermaid\">\u003C!---->\u003Ccode class=\"language-mermaid\">timeline\n    title Chasms\n    Innovators : Is it viable?\n    Early Adopters : Finding the MVP\n\t\t\t\t   : Dominate a niche market to cross the chasm\n    Early Majority : Finding the entire product solution\n\t               : Make the product easy to adopt to cross this chasm\n                 : Stage contains high adoption density\n    Late Majority : Make the product easy to adopt\n                  : Stage contains high adoption density\n    Laggards : Bring all users along for the journey\u003C/code>\u003C!---->\u003C/pre> \u003Cp>The \u003Cem>innovators\u003C/em> are defined as the group of people that dig into the details. This book is overly generic in defining who these people are, using stereotypes, but it describes this group as people that sweat details and care more about new technology being a viable solution or step forward more than anything else. These \u003Cem>people\u003C/em> tend to want \u003Cem>the technology at cost or without charge\u003C/em> but in return they’ll offer you invaluable insight that can help define what markets should be targeted or what the product direction should be focused on.\u003C/p> \u003Cp>The next group are the \u003Cem>early adopters\u003C/em> called \u003Cem>visionaries\u003C/em>. This group usually cares about high-risk and high-reward bets. They are characterized as hard to work with, but defining an MVP and target market is even harder without them. Given that this group is taking high-risk bets, the potential to go down the wrong path following them is higher.\u003C/p> \u003Cp>The \u003Cem>early majority\u003C/em> group, called \u003Cem>pragmatists\u003C/em>, are defined as wanting to build lasting and sustaining value over the long term. This is the most difficult chasm to cross into because:\u003C/p> \u003Cblockquote>\u003Cp>people will only purchase when they can reference other major players using this to hedge their risk.\nThe difficulty is the chicken and egg paradox, in order to get \u003Cem>major players\u003C/em> you need \u003Cem>major players\u003C/em>.\u003C/p>\u003C/blockquote> \u003Cp>The next group being the \u003Cem>late majority\u003C/em>, called \u003Cem>conservatives\u003C/em>, are described as people that don’t want to deal with changes unless it’s as easy as possible, and potentially forced.\u003C/p> \u003Cp>The last group, \u003Cem>laggards\u003C/em> or \u003Cem>skeptics\u003C/em>, are the people that want nothing to do with technological change. They perceive changes as needless risk where the consequences of change are unknown.\u003C/p> \u003Cp>To cross the largest chasm, target a niche market and dominate it. The name of the game is organic growth by spreading through word of mouth by being too good to give up in a particular market that will make it a default offering, eventually becoming a default choice in adjacent markets one by one.\u003C/p> \u003Cp>To market properly means determining the \u003Cem>positioning\u003C/em> of the product: what makes it stand out and uniquely different. Making claims, or elevator pitches, are also different depending on what market stage the business is in. The core take away is that this really requires the entire company to be on board with the goal of crossing the chasm of the early adopters -> early majority. The \u003Cem>post-chasm\u003C/em> phase occurring after describes a new set of challenges to overcome in order to be a viable company. There is now a people problem, the visionaries are people that don’t want to focus on stabilization efforts and the pragmatists don’t want to take needless unproven risks. The former were vital to building the company into what it has become but might not be helpful in taking the company forward so there is now a talent problem. Do you hire people, fire people, try to motivate people into new tasks and goals? It’s quite possible that it requires some combination of all the above. What initially attracted a certain type of person might no longer be valid and its worth acknowledging that and creating a humane plan for it in advance (assuming you’re a leader in that position).\u003C/p> \u003Ch2 id=\"maelstroms\">\u003Ca href=\"#maelstroms\">Maelstroms\u003C/a>\u003C/h2> \u003Cp>How do large and successful businesses capitalize on the innovation of disruptive technologies? The \u003Cem>Innovator’s Dilemma\u003C/em> is the book that breaks down the first core problem mentioned at the beginning, defining how businesses fail to adapt. This is my favorite book of the four because it’s backed up by real data instead of lived experience and describes the mechanisms by which failures occur while not prescribing over-arching solutions.\u003C/p> \u003Ch3 id=\"understanding-the-problem\">\u003Ca href=\"#understanding-the-problem\">Understanding the Problem\u003C/a>\u003C/h3> \u003Cp>Better management or being more technically innovative with respect to disruptive technologies, does not solve the problem. Instead, the same things that make a company successful to begin with also make it static because focusing attention on current customers means less time to pay attention to new markets and new customer segments created by changes to technologies. The capabilities, organizational structures, and decision making processes that make the current company successful should not be discarded, but the fact that they exist makes it hard to create new ones to manage new products and technologies, potentially in new markets.\u003C/p> \u003Cp>Products that don’t appear useful today could be highly relevant tomorrow. Being customer focused is a draw back while exploring new possibilities especially in markets that don’t exist yet. This means that organizations are more likely to starve innovative solutions of resources before they reach a critical mass. The value networks of a company is a big factor in resource allocation but it can be used both as a benefit multiplier or a drawback when networks need to be created.\u003C/p> \u003Cp>Disruptive technologies should be seen as marketing challenges rather than engineering ones. This is because they open up new markets or market segments rather than fitting into the existing market of a \u003Cem>sustaining technology\u003C/em>: the technology that makes the business successful.\u003C/p> \u003Cp>\u003Cem>Capabilities\u003C/em> are usually highly specialized and context specific because they’re created in \u003Cem>value networks\u003C/em>, which means they are tied to fixed markets and those same value networks disable them from other markets.\u003C/p> \u003Cp>Finding or innovating a disruptive technology is high risk, meaning that there is potential for high costs. It’s possible to get lucky but lowering the cost is better, if possible. The goal to innovating a disruptive technology is to make sure there is enough budget to try, fail, and iterate. Leaving room for iteration is key because if a new potential market is found then time and money to invest into it is needed, all while keeping afloat the current business.\u003C/p> \u003Cp>Deciding when to be a leader or follower, with respect to a disruptive technology, is also context specific. Different postures are needed for both \u003Cem>sustaining\u003C/em> and \u003Cem>disruptive\u003C/em> technologies. Disruptive technologies often have distinct first mover advantages but sustaining ones do not. Both incremental updates to technology vs giant leaps forward historically perform about as well. New technologies have powerful barriers to entry. They are different than ones economists normally measure and experience, because they don’t map to existing models well, it is hard to know what type will be successful.\u003C/p> \u003Ch3 id=\"discord-and-navigational-gudiance\">\u003Ca href=\"#discord-and-navigational-gudiance\">Discord and Navigational Gudiance\u003C/a>\u003C/h3> \u003Cp>The principles of disruptive technologies are described by the following:\u003C/p> \u003Cul>\u003Cli>companies depend on customers and investors to survive \u003Cul>\u003Cli>high performing companies have good systems for killing ideas that customers don’t want\u003C/li>\u003C/ul>\u003C/li> \u003Cli>small markets don’t solve the growth needs of large companies \u003Cul>\u003Cli>successful companies need to grow which makes small markets undesirable both internally and externally \u003Cul>\u003Cli>internally, employees want to find ways to make larger impact to find promotions for performance evaluations, as a driving incentive\u003C/li> \u003Cli>externally, share holders want stock value to go up exacerbating the need for short term gains opposed to sustainable business practices\u003C/li>\u003C/ul>\u003C/li>\u003C/ul>\u003C/li> \u003Cli>markets that don’t exist can’t be analyzed \u003Cul>\u003Cli>if the data doesn’t exist then how is it possible to persuade anyone on taking the risk and allocating resources to a project?\u003C/li>\u003C/ul>\u003C/li> \u003Cli>supply may not meet demand \u003Cul>\u003Cli>pace of technological progress is ahead of market needs\u003C/li>\u003C/ul>\u003C/li>\u003C/ul> \u003Cp>Characteristics of disruptive technologies are that they tend to be cheaper, lower performing, and simpler; generally having lower profits and margins and target emerging markets. There is a tendency to always move up market targeting higher profits and yields, people get greedy rather than sustain the thing they have. When investing in new technologies and making bets, assume that they’ll be wrong. This is mostly a game of statistics, all it takes is one good bet to makeup for the loss of the others. Disruptive technologies often capitalize on things that existing customers don’t need or want, therefore generating a new market and removing barriers and competition, until those markets \u003Cstrong>become\u003C/strong> the main market. A product’s maturity usually progresses in the following order:\u003C/p> \u003Cpre class=\"language-mermaid\">\u003C!---->\u003Ccode class=\"language-mermaid\">timeline\n    title Product Maturity\n    Functionality : Does it work?\n    Reliability : Reducing operational failures of solution\n    Convenience : Making the solution convenient to adopt\n    Price : How much does it cost compared to competition\u003C/code>\u003C!---->\u003C/pre> \u003Cp>Mapping how many times this has happened or where a product is along this trajectory could be an indicator for how important new investments might be. Senior executives are usually enslaved to the ideas that middle management bring up. Encouraging employees to be disruptive and having a system that caters for difference helps. Can corps. redesign the organization structures to better suite disruptive innovation and account for it? This is an open question since it could be company, market, or industry specific. How do you decide when an idea is worth pursuing? Often well managed companies fail because they are well managed by current standards. What can be done to see that these norms get adjusted to account for dynamism over time, is the closing thought.\u003C/p> \u003Ch2 id=\"answering-the-innovator\">\u003Ca href=\"#answering-the-innovator\">Answering the Innovator\u003C/a>\u003C/h2> \u003Cp>\u003Cem>Escape Velocity\u003C/em>, provides a theoretical foundation for the open questions posed in \u003Cem>Innovator’s Dilemma\u003C/em> – how can an existing successful company be structured in a way that can take advantage of disruptive technologies?\u003C/p> \u003Cp>They describe two strategies, outside-in and inside-out, as essential to executing innovative ideas. The former focuses on outsider perspectives to market trends and the latter is the view of vision and strategy from within. The \u003Cem>hierarchy of powers\u003C/em> provides a map to address the difference between vision and strategy, so:\u003C/p> \u003Cblockquote>\u003Cp>the right questions, get the right answers, at the right time, in the right sequence.\u003C/p>\u003C/blockquote> \u003Cp>The hierarchy of powers begins with \u003Cem>category power\u003C/em>, a function of demand for a given class of products relative to others. Entering new categories is essential to transforming a company. As he likes to state, “last year’s plan always favors the current portfolio.” Next is \u003Cem>company power\u003C/em>, it reflects the status and prospects of a specific vendor relative to its competitive set. These can be different for each category the company operates in but the sum-total of all categories is the company power. Asymmetrical bets are hard to get right but are necessary to remain competitive. \u003Cem>Market power\u003C/em> follows and is the same as company power but within a single market segment. Being a market leader is a sustainable competitive advantage. Market tipping points are real, they suggests getting a dollar in a new market is better than one coming from anywhere else because demand in a segment leads to more demand. \u003Cem>Offer power\u003C/em> is a function of demand for a product relative to its competitors. How many people want to buy the product in comparison to similar products. This can change over time when products get commoditized, which means innovating is mandatory to survive. Lastly, \u003Cem>execution power\u003C/em> is the ability to outperform competitors. Executing traditionally can be part of the problem to innovation. Innovate to achieve competitive separation. Institutionalize the activities that underlie the separation then drive the transition from innovation to deployment. Each power are described as a \u003Cem>vector\u003C/em>, things with magnitude and direction. When they’re misaligned forward progress can cancel each other out while alignment is synergistic.\u003C/p> \u003Cp>Category power is the number one predictor of future progress. The category maturity model and life-cycle has five states:\u003C/p> \u003Col>\u003Cli>Emerging categories: high risk and high reward which is great for startups and bad for existing companies\u003C/li> \u003Cli>Growth categories: people getting rich through user growth via land grabs\u003C/li> \u003Cli>Mature categories: low risk and can innovate through optimization successfully\u003C/li> \u003Cli>Declining categories: still valuable but will die, divest here\u003C/li> \u003Cli>End of life\u003C/li>\u003C/ol> \u003Cp>Three time horizons are described as places to focus bets and strategies. Horizon one (H1) is for resource plans expected to turn a profit within a year or two. Horizon two (H2) is for the technical setup and foundations for success of new products or technologies. Horizon three (H3) is for visionary leaps. H2 efforts are the ones that matter most but are the least likely to be invested in because they contain the most uncertainty and impact real resources; H3 has a potential stake in future resources, rather than current ones. H2 is focused one the execution of independent but vertically integrated businesses.\u003C/p> \u003Cp>Two types of business strategies in technology are described, the first being a complex systems offering, the second is based on moving volume of the product or service. In other words, create a complex system that others can benefit from by operating it with ease, or sell a service or product that’s good and do it a lot.\u003C/p> \u003Cp>The book describes a playbook for utilizing its reported findings:\u003C/p> \u003Cul>\u003Cli>Find growth categories by making asymmetrical bets and temporary rapid investments in emergent H3 categories then promote them to H2 and it’ll be possible to create secular growth.\u003C/li> \u003Cli>Creating asymmetrical bets by developing and fostering core differentiation will build company power. Establish the vision, strategy, and leadership required to gain traction and distance yourself from competitors in target markets.\u003C/li> \u003Cli>Establish \u003Cem>market power\u003C/em> by finding markets in transition (markets that are in need of a solution or ready for disruption). Create partnerships with leaders, companies in target market, and subject matter experts, then focus on building a \u003Cem>whole offer\u003C/em> founded on your \u003Cem>crown jewels\u003C/em> with the intent dominating a market subcategory by creating value no one else can compete with.\u003C/li> \u003Cli>Create critical differentiators in your product by leveraging core capabilities in an effort to make them unique.\u003C/li> \u003Cli>Execution dynamics: \u003Cul>\u003Cli>Playbooks are preconfigured solution-kits that are tailored to customer requirements. The solutions are not \u003Cem>custom\u003C/em> but \u003Cem>customized\u003C/em>. \u003Cem>Projects\u003C/em> are basically installs that are entirely custom each time, which is far from ideal.\u003C/li> \u003Cli>Complex systems: these businesses can be optimized highly in order to grow so that they can keep selling solutions at scale or shift business strategies to volume based once commoditized.\u003C/li> \u003Cli>Invention, deployment, and optimization are seen as three phases in a product or company lifecycle where management in one phase is usually sub-optimal for the others. Innovation phase type organization design should be fully integrated, but that doesn’t scale into deployment. The deployment phase has separate functions where sales, marketing, and engineering all report to separate people. The optimization phase attempts to create an organization that removes redundancy and increases resilience through things like additional review. It’s a good thing towards a product’s end of life.\u003C/li> \u003Cli>Create local centers of excellence: this is for each product phase.\u003C/li> \u003Cli>Catalytic programs are designed for executives, they basically transparently post overall status on core objectives as a way to maintain control and alignment of vision.\u003C/li> \u003Cli>Knowledge management is an issue everywhere; making communication flow seamlessly and getting to a just-in-time information model is the ideal.\u003C/li>\u003C/ul>\u003C/li>\u003C/ul> \u003Ch2 id=\"executing-the-strategy\">\u003Ca href=\"#executing-the-strategy\">Executing the Strategy\u003C/a>\u003C/h2> \u003Cp>\u003Cem>Zone to Win\u003C/em>, is a \u003Cem>playbook\u003C/em> for \u003Cem>Escape Velocity\u003C/em>, which is primarily its theoretical counterpart. The idea being the way an organization is structured has a big impact on its long-term success and this describes in detail, a specific strategy for long-term success in large organizations. When an organization is structured entirely around its core competencies and business, there will be a \u003Cem>crises of prioritization\u003C/em>, where all the resources are at competition with different initiatives.\u003C/p> \u003Cp>Four zones are described:\u003C/p> \u003Cpre class=\"language-mermaid\">\u003C!---->\u003Ccode class=\"language-mermaid\">quadrantChart\n    title Organizational Zones\n    x-axis Disruptive Innovation --&gt; Sustaining Innovation\n    y-axis Enabling Investments --&gt; Revenue Performance\n    quadrant-1 &quot;Performance Zone (Horizon 1)&quot;\n    quadrant-2 &quot;Transformation Zone (Horizon 2)&quot;\n    quadrant-3 &quot;Incubation Zone (Horizon 3)&quot;\n    quadrant-4 &quot;Productivity Zone (Horizon 1)&quot;\u003C/code>\u003C!---->\u003C/pre> \u003Cp>This organizing structure for an organization makes it easy to logically separate resources for different projects. The \u003Cem>transformation zone\u003C/em> may not always exist because only a single successful transformation is required to sustain a business for a decade. The other three are always required however. There is a concept of \u003Cem>defense\u003C/em> and \u003Cem>offense\u003C/em> where the former is used in times of emergency, basically trying to take new technology in development from the \u003Cem>incubation zone\u003C/em> and put it into the \u003Cem>performance zone\u003C/em>; the latter is all about getting a new competing technology out to market first.\u003C/p> \u003Cp>The \u003Cem>performance zone\u003C/em> is all about sales and everything that drives revenue. Building a performance matrix will show what the cost centers are and in times of stability rather than disruption, these can be optimized to hit max revenue targets.\u003C/p> \u003Cp>For people in business speak, the \u003Cem>productivity zone\u003C/em> is seen as everything that doesn’t drive revenue and are considered \u003Cem>cost centers\u003C/em>. This is why you are measured as a line item in a spreadsheet. The performance zone handles the top line making the number increase from a sales perspective while the \u003Cem>productivity zone\u003C/em> drives the bottom line. Areas to focus on in order to reduce cost to increase the bottom line of what already exists.\u003C/p> \u003Cp>The \u003Cem>incubation zone\u003C/em> is basically a bunch of projects that are not particularly R&amp;D but are more like separate product bets, which may include some R&amp;D. These should be filled with people trying to find ways to grow the company but the chances you have to incubate something are finite. Anything that shows strong potential in this category moves to the \u003Cem>transformation zone\u003C/em>.\u003C/p> \u003Cp>The \u003Cem>transformation zone\u003C/em> is a graduated \u003Cem>incubation zone\u003C/em> project. The time horizon on this is shorter and the idea is to focus the entire executive staff on turning this into the core offerings available to all to hit new markets and drive non-linear growth. This is hard because it requires deep focus and alignment from the entire company to do right, as well as sacrifices from the performance zone by replacing some columns of the performance matrix with the new product undergoing transformation which will perform worse for the foreseeable future.\u003C/p> \u003Cp>Horizon zero (H0) is used to describe products or services that should hit an end-of-life target. This should be handled by different leadership than the current staff in charge of running the targeted service because there is too much potential for conflicts of interest. H0 is used as a strategy to free up resources and allocate them to a transformation effort. This might be people, or it might be systems. If it’s people, they’ll either be shifted around or fired. This is one reason for a \u003Cem>reduction in force\u003C/em>.\u003C/p> \u003Cp>Zone management is basically giving each org a designated zone. Each organization can only be part of a single zone because they must deliver on the zone’s contract. Each org is judged on its performance in their zone designation.\u003C/p> \u003Cp>While the \u003Cem>incubation\u003C/em> zone has a finite amount of incubated projects, the transformation zone can only have a single project in that phase at a time. This puts pressure in a lot of places requiring every person to be aligned to make it work; this is core to the strategy. The other call out is that while in \u003Cem>offense\u003C/em> mode you have time to be the disruptor and make a new market, but in \u003Cem>defense\u003C/em> mode where you’re basically trying to pull a project from the incubator zone into the transformation zone and slap it into the main offerings as a kludge, you can only be in one of these two states. It’s unlikely to work in your favor to play offense and defense at the same time just as it is not ideal to work on two main objectives at the same time.\u003C/p> \u003Ch2 id=\"criticisms\">\u003Ca href=\"#criticisms\">Criticisms\u003C/a>\u003C/h2> \u003Cp>\u003Cem>Crossing the Chasm\u003C/em> assumes that markets are not interdependent entities but live in isolation. The book uses many stereotypes and assumptions making conclusions based on story rather than evidence, in fact this is true of all of \u003Cem>Geoffry Moore’s works. They use hand picked stories from lived experience as opposed to something like a _systematic review\u003C/em> of technology companies. Instead of treating markets like hostile takeovers and warfare, it could focus on satisfying the niche needs of users and expanding without appealing to violent metaphors. It is possible to build a company that respects others in the same market and still be the main player of a segment. It is also true that other people will be playing zero-sum games, so these books do provide the mental framework for how others may be looking at you. The assumptions still make a compelling case and this data was gathered through years of lived experience by the author, it’d be wrong to wave it away, but also don’t treat it like a perfect predictive model. Both \u003Cem>Escape Velocity\u003C/em> and \u003Cem>Zone to Win\u003C/em> reference other books written by the author and stated as fact which is pretty hard to swallow. More description should be given when defining terms.\u003C/p> \u003Cp>While I find \u003Cem>The Innovator’s Dilemma\u003C/em> the most compelling read, it is ultimately looking at a subset of technology companies from the past in order to provide some context about future performance and indicators for company distress in the future. The problem is that markets change significantly, as do their operating conditions. These books are far from perfect, but I do think they provide some useful insights as long as you don’t take a puritanical view and hold them up as \u003Cem>the truth\u003C/em>. Like everything else in life, context of a situation matters a lot more than prescriptive models that don’t touch it.\u003C/p>\u003C!--]-->",fields:{slug:"/valley_strategy"},timeToRead:5}],tag:"Summary"},uses:{params:["tag"]}}}(Array(1),Array(2)))],
